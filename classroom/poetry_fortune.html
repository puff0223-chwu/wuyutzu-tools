<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>巫魚子詩籤 — 求一籤，得一語</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #8B1A1A;
    --deep-red: #6B0F0F;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #9A7A2E;
    --paper: #F5EDD8;
    --paper-dark: #E8D9B8;
    --ink: #2A1A0E;
    --smoke: rgba(255,255,255,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #1A0808;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(139,26,26,0.4) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    padding: 20px;
    overflow-x: hidden;
  }

  /* LANTERNS */
  .lanterns {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    padding: 0 40px;
    pointer-events: none;
    z-index: 0;
  }
  .lantern {
    width: 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: sway 4s ease-in-out infinite;
  }
  .lantern:nth-child(2) { animation-delay: -1.3s; }
  .lantern:nth-child(3) { animation-delay: -2.6s; }
  .lantern:nth-child(4) { animation-delay: -0.7s; }
  .lantern:nth-child(5) { animation-delay: -3.1s; }
  @keyframes sway {
    0%,100% { transform: rotate(-4deg); }
    50% { transform: rotate(4deg); }
  }
  .lantern-string { width: 1px; height: 40px; background: var(--gold-dark); }
  .lantern-top { width: 20px; height: 6px; background: var(--gold); border-radius: 2px; }
  .lantern-body {
    width: 28px; height: 50px;
    background: radial-gradient(ellipse at 40% 30%, #FF6B35, #CC2200);
    border-radius: 40%;
    box-shadow: 0 0 12px rgba(255,100,50,0.6), inset 0 0 8px rgba(255,200,100,0.3);
    position: relative;
    overflow: hidden;
  }
  .lantern-body::after {
    content: '';
    position: absolute;
    top: 10%; left: 15%; width: 30%; height: 60%;
    background: rgba(255,220,150,0.25);
    border-radius: 50%;
  }
  .lantern-bottom { width: 20px; height: 6px; background: var(--gold); border-radius: 2px; }
  .lantern-tail { width: 1px; height: 20px; background: var(--gold-dark); }

  /* SCREENS */
  .screen {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ===== SCREEN 1: ENTRY ===== */
  #screen-entry {
    text-align: center;
    gap: 0;
  }

  .title-block {
    margin-bottom: 32px;
  }
  .title-main {
    font-size: 2.6rem;
    font-weight: 900;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.5), 0 2px 4px rgba(0,0,0,0.8);
    letter-spacing: 0.15em;
    line-height: 1.2;
    writing-mode: horizontal-tb;
  }
  .title-sub {
    font-size: 0.85rem;
    color: rgba(201,168,76,0.6);
    letter-spacing: 0.4em;
    margin-top: 8px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
    margin: 20px auto;
    position: relative;
  }
  .divider::before {
    content: '◆';
    position: absolute;
    top: -9px; left: 50%;
    transform: translateX(-50%);
    color: var(--gold);
    font-size: 0.7rem;
  }

  .entry-box {
    background: linear-gradient(160deg, rgba(139,26,26,0.3), rgba(42,10,10,0.6));
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 4px;
    padding: 36px 32px;
    width: 100%;
    position: relative;
  }
  .entry-box::before, .entry-box::after {
    content: '✦';
    position: absolute;
    color: var(--gold-dark);
    font-size: 0.7rem;
  }
  .entry-box::before { top: 10px; left: 14px; }
  .entry-box::after { bottom: 10px; right: 14px; }

  .entry-prompt {
    color: rgba(245,237,216,0.8);
    font-size: 1rem;
    margin-bottom: 24px;
    letter-spacing: 0.1em;
    line-height: 1.8;
  }

  .name-input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(245,237,216,0.08);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 2px;
    color: var(--paper);
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    transition: all 0.3s;
    margin-bottom: 24px;
  }
  .name-input::placeholder { color: rgba(245,237,216,0.3); font-size: 1rem; }
  .name-input:focus {
    border-color: var(--gold);
    background: rgba(245,237,216,0.12);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }

  .btn-draw {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--crimson), var(--deep-red));
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
    font-family: 'Noto Serif TC', serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.3em;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }
  .btn-draw:hover {
    background: linear-gradient(135deg, #A02020, #7A1515);
    box-shadow: 0 0 20px rgba(139,26,26,0.6);
    color: var(--gold);
  }
  .btn-draw:active { transform: scale(0.98); }
  .btn-draw::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 30%; height: 200%;
    background: rgba(255,255,255,0.08);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }
  .btn-draw:hover::before { left: 130%; }

  /* ===== SCREEN 2: LOADING ===== */
  #screen-loading {
    align-items: center;
    text-align: center;
    gap: 20px;
    padding: 40px 20px;
  }

  .loading-title {
    font-size: 1.5rem;
    color: var(--gold);
    letter-spacing: 0.2em;
    font-weight: 600;
    line-height: 2;
    text-align: center;
    text-shadow: 0 0 15px rgba(201,168,76,0.4);
    animation: pulse-text 1.5s ease-in-out infinite;
  }
  @keyframes pulse-text {
    0%,100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* SHAKER ANIMATION */
  .shaker-container {
    position: relative;
    width: 120px;
    height: 180px;
    margin: 10px auto;
  }

  .shaker {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 130px;
    animation: shake 0.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes shake {
    0%   { transform: translateX(-50%) rotate(0deg); }
    15%  { transform: translateX(-50%) rotate(-18deg); }
    30%  { transform: translateX(-50%) rotate(14deg); }
    45%  { transform: translateX(-50%) rotate(-12deg); }
    60%  { transform: translateX(-50%) rotate(10deg); }
    75%  { transform: translateX(-50%) rotate(-6deg); }
    100% { transform: translateX(-50%) rotate(0deg); }
  }

  .stick-fly {
    position: absolute;
    width: 6px;
    height: 40px;
    background: linear-gradient(to bottom, var(--gold), #8B6914);
    border-radius: 3px 3px 1px 1px;
    opacity: 0;
    animation: fly-out 0.5s ease-in-out infinite;
  }
  .stick-fly:nth-child(1) { animation-delay: 0s; left: 30px; }
  .stick-fly:nth-child(2) { animation-delay: 0.1s; left: 50px; }
  .stick-fly:nth-child(3) { animation-delay: 0.2s; left: 70px; }
  @keyframes fly-out {
    0%   { opacity: 0; transform: translateY(0) rotate(0deg); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-80px) rotate(30deg); }
  }

  .loading-dots {
    display: flex; gap: 8px; justify-content: center;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--gold-dark);
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* ===== SCREEN 3: RESULT ===== */
  #screen-result {
    align-items: center;
    gap: 0;
    animation: fadeInUp 0.8s ease forwards;
    max-width: 480px;
    width: 100%;
    padding: 10px 0;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    text-align: center;
    margin-bottom: 10px;
  }
  .result-name {
    font-size: 0.9rem;
    color: rgba(201,168,76,0.7);
    letter-spacing: 0.4em;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
  }
  .result-name span {
    color: var(--gold);
    font-family: 'Noto Serif TC', serif;
    font-size: 1rem;
    font-weight: 600;
  }

  /* THE FORTUNE SLIP — vertical, compact */
  .fortune-slip {
    width: 200px;
    background: linear-gradient(180deg, var(--paper-dark) 0%, var(--paper) 12%, var(--paper) 88%, var(--paper-dark) 100%);
    border-left: 3px solid var(--gold);
    border-right: 3px solid var(--gold);
    box-shadow:
      0 0 30px rgba(201,168,76,0.3),
      inset 2px 0 8px rgba(0,0,0,0.06),
      inset -2px 0 8px rgba(0,0,0,0.06);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: unroll 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes unroll {
    from { transform: scaleY(0.1); opacity: 0; transform-origin: top center; }
    to { transform: scaleY(1); opacity: 1; }
  }

  .slip-top-bar {
    width: 100%;
    background: var(--crimson);
    padding: 6px 4px;
    text-align: center;
    position: relative;
  }
  .slip-top-bar::before, .slip-top-bar::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 4px;
    background: var(--gold-dark);
  }
  .slip-top-bar::before { left: 0; }
  .slip-top-bar::after { right: 0; }

  .slip-title {
    color: var(--gold-light);
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    writing-mode: horizontal-tb;
  }

  .slip-number {
    font-size: 0.65rem;
    color: var(--crimson);
    letter-spacing: 0.25em;
    font-family: 'Noto Sans TC', sans-serif;
  }

  .slip-grade {
    background: var(--crimson);
    color: var(--gold-light);
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    padding: 2px 10px;
    border: 1px solid var(--gold-dark);
  }

  .slip-verse {
    writing-mode: vertical-rl;
    text-orientation: mixed;
    font-size: 1.25rem;
    color: var(--ink);
    line-height: 1.8;
    letter-spacing: 0.15em;
    font-weight: 600;
    text-align: center;
    max-height: 220px;
    overflow: visible;
  }

  .slip-divider {
    width: 60%;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-dark), transparent);
  }

  .slip-source {
    font-size: 0.62rem;
    color: rgba(42,26,14,0.5);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Sans TC', sans-serif;
    border-top: 1px solid rgba(42,26,14,0.15);
    padding-top: 6px;
    width: 100%;
  }

  .encouragement-block {
    width: 200px;
    background: linear-gradient(160deg, rgba(139,26,26,0.25), rgba(26,8,8,0.5));
    border: 1px solid rgba(201,168,76,0.25);
    border-top: none;
    padding: 14px 16px;
  }
  .encouragement-label {
    font-size: 0.65rem;
    color: var(--gold-dark);
    letter-spacing: 0.35em;
    margin-bottom: 8px;
    text-align: center;
    font-family: 'Noto Sans TC', sans-serif;
  }
  .encouragement-text {
    color: rgba(245,237,216,0.85);
    font-size: 0.8rem;
    line-height: 1.8;
    letter-spacing: 0.06em;
    text-align: justify;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    width: 200px;
    margin-top: 12px;
  }
  .btn-next, .btn-again {
    flex: 1;
    padding: 11px 6px;
    font-family: 'Noto Serif TC', serif;
    font-size: 0.82rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s;
    font-weight: 600;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--crimson), var(--deep-red));
    border: 1px solid var(--gold-dark);
    color: var(--gold-light);
  }
  .btn-next:hover {
    box-shadow: 0 0 16px rgba(139,26,26,0.5);
    color: var(--gold);
  }
  .btn-again {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: rgba(201,168,76,0.6);
  }
  .btn-again:hover {
    border-color: var(--gold-dark);
    color: var(--gold);
    background: rgba(201,168,76,0.05);
  }

  /* SMOKE PARTICLES */
  .smoke { position: fixed; pointer-events: none; z-index: 1; }
  .smoke-particle {
    position: absolute;
    width: 4px; height: 4px;
    background: rgba(255,220,180,0.15);
    border-radius: 50%;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0) scale(1); opacity: 0.4; }
    100% { transform: translateY(-200px) translateX(var(--drift)) scale(3); opacity: 0; }
  }
</style>
</head>
<body>

<!-- LANTERNS -->
<div class="lanterns">
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tail"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tail"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tail"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tail"></div></div>
  <div class="lantern"><div class="lantern-string"></div><div class="lantern-top"></div><div class="lantern-body"></div><div class="lantern-bottom"></div><div class="lantern-tail"></div></div>
</div>

<!-- SMOKE -->
<div class="smoke" id="smoke"></div>

<!-- SCREEN 1: ENTRY -->
<div class="screen active" id="screen-entry">
  <div class="title-block">
    <div class="title-main">巫魚子文青學院</div>
    <div class="title-sub">求一籤，得一語，勉勵前行</div>
  </div>
  <div class="divider"></div>
  <div class="entry-box">
    <div class="entry-prompt">
      靜心片刻<br>
      請輸入您的姓名，誠心一求
    </div>
    <input class="name-input" id="name-input" type="text" placeholder="請輸入姓名" maxlength="10" />
    <button class="btn-draw" id="btn-draw" onclick="startDraw()">誠 心 求 籤</button>
  </div>
</div>

<!-- SCREEN 2: LOADING -->
<div class="screen" id="screen-loading">
  <div class="loading-title">
    巫魚子大師感應中<br>Loading 中
  </div>

  <!-- SHAKER SVG -->
  <div class="shaker-container">
    <div class="stick-fly"></div>
    <div class="stick-fly"></div>
    <div class="stick-fly"></div>
    <svg class="shaker" viewBox="0 0 80 130" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cylinder body -->
      <ellipse cx="40" cy="20" rx="30" ry="10" fill="#6B2A00" stroke="#C9A84C" stroke-width="1.5"/>
      <rect x="10" y="20" width="60" height="90" fill="url(#woodGrad)" />
      <ellipse cx="40" cy="110" rx="30" ry="10" fill="#4A1A00" stroke="#C9A84C" stroke-width="1.5"/>
      <!-- Wood grain lines -->
      <line x1="20" y1="25" x2="20" y2="105" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
      <line x1="32" y1="22" x2="32" y2="108" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
      <line x1="48" y1="22" x2="48" y2="108" stroke="rgba(0,0,0,0.1)" stroke-width="0.5"/>
      <line x1="60" y1="25" x2="60" y2="105" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"/>
      <!-- Gold bands -->
      <rect x="10" y="30" width="60" height="5" fill="url(#goldBand)" opacity="0.8"/>
      <rect x="10" y="95" width="60" height="5" fill="url(#goldBand)" opacity="0.8"/>
      <!-- Chinese character -->
      <text x="40" y="75" text-anchor="middle" font-family="serif" font-size="22" fill="#C9A84C" opacity="0.9">籤</text>
      <!-- Sticks inside top -->
      <rect x="32" y="5" width="4" height="22" fill="#C9A84C" rx="2"/>
      <rect x="40" y="3" width="4" height="24" fill="#E8C97A" rx="2"/>
      <rect x="48" y="5" width="4" height="22" fill="#C9A84C" rx="2"/>
      <defs>
        <linearGradient id="woodGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#7A3500"/>
          <stop offset="30%" stop-color="#9B4800"/>
          <stop offset="70%" stop-color="#8A3E00"/>
          <stop offset="100%" stop-color="#6B2A00"/>
        </linearGradient>
        <linearGradient id="goldBand" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#9A7A2E"/>
          <stop offset="50%" stop-color="#E8C97A"/>
          <stop offset="100%" stop-color="#9A7A2E"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

  <div class="loading-dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div class="screen" id="screen-result">
  <div class="result-header">
    <div class="result-name" id="result-name-display">◆ <span></span> ◆ 所求之籤</div>
  </div>

  <div class="fortune-slip" id="fortune-slip">
    <div class="slip-top-bar">
      <div class="slip-title">巫魚子文青學院</div>
    </div>
    <div class="slip-number" id="slip-number">第 一 籤</div>
    <div class="slip-grade" id="slip-grade">上上籤</div>
    <div class="slip-verse" id="slip-verse">千里之行，始於足下</div>
    <div class="slip-divider"></div>
    <div class="slip-source" id="slip-source">── 老子《道德經》</div>
  </div>

  <div class="encouragement-block">
    <div class="encouragement-label">✦ 巫魚子解說 ✦</div>
    <div class="encouragement-text" id="encouragement-text">每一段遠大的旅程，都從你現在踏出的這一步開始。不要因為終點遙遠而氣餒，你每天的努力都是真實存在的前進。</div>
  </div>

  <div class="btn-row">
    <button class="btn-again" onclick="drawAgain()">換一支籤</button>
    <button class="btn-next" onclick="nextStudent()">下一位同學</button>
  </div>
</div>

<script>
const FORTUNES = [
  // ═══ 類別一：中文現代文學（三毛、張愛玲、余光中、龍應台等）× 12 ═══
  {
    number: "第 一 籤", grade: "上上籤",

let currentName = "";
let usedIndices = {};

function startDraw() {
  const name = document.getElementById("name-input").value.trim();
  if (!name) {
    document.getElementById("name-input").focus();
    document.getElementById("name-input").style.borderColor = "rgba(255,80,80,0.6)";
    setTimeout(() => { document.getElementById("name-input").style.borderColor = "rgba(201,168,76,0.4)"; }, 1000);
    return;
  }
  currentName = name;
  showScreen("screen-loading");
  setTimeout(() => showFortune(name), 2800);
}

function showFortune(name) {
  if (!usedIndices[name]) usedIndices[name] = [];
  
  let available = FORTUNES.map((_, i) => i).filter(i => !usedIndices[name].includes(i));
  if (available.length === 0) {
    usedIndices[name] = [];
    available = FORTUNES.map((_, i) => i);
  }

  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices[name].push(idx);
  const f = FORTUNES[idx];

  document.querySelector("#result-name-display span").textContent = name;
  document.getElementById("slip-number").textContent = f.number;
  document.getElementById("slip-grade").textContent = f.grade;
  document.getElementById("slip-verse").textContent = f.verse;
  document.getElementById("slip-source").textContent = f.source;
  document.getElementById("encouragement-text").textContent = f.encouragement;

  showScreen("screen-result");
}

function drawAgain() {
  showScreen("screen-loading");
  setTimeout(() => showFortune(currentName), 2800);
}

function nextStudent() {
  currentName = "";
  document.getElementById("name-input").value = "";
  showScreen("screen-entry");
  setTimeout(() => document.getElementById("name-input").focus(), 300);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SMOKE PARTICLES
const smokeEl = document.getElementById("smoke");
for (let i = 0; i < 12; i++) {
  const p = document.createElement("div");
  p.className = "smoke-particle";
  p.style.left = (20 + Math.random() * 60) + "vw";
  p.style.bottom = (10 + Math.random() * 30) + "vh";
  p.style.setProperty("--drift", (Math.random() * 40 - 20) + "px");
  p.style.animationDuration = (4 + Math.random() * 6) + "s";
  p.style.animationDelay = (Math.random() * 6) + "s";
  smokeEl.appendChild(p);
}

// Enter key support
document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") startDraw();
});
</script>
